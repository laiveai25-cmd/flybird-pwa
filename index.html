<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#071A5A" />
<link rel="manifest" href="manifest.json" />
<title>Flybird GIV Pre-flight Inspection</title>
<style>
  :root{
    --navy:#071A5A; --navy-2:#0d2673; --mint:#8CC8BE; --cream:#F7F2EC;
    --gold:#C9A84C; --gold-deep:#974706; --blue:#003B73;
    --pending:#C9873A; --synced:#2E8B6F; --offline:#B23A48;
    --bg:#eef0f4; --card:#ffffff; --ink:#0d1526; --muted:#5a6577;
    --line:#dfe3ea; --chip:#f0f2f6;
    --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#070b16; --card:#111a2e; --ink:#e8ecf4; --muted:#93a0b8;
      --line:#243149; --chip:#1a2540; --cream:#111a2e; }
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--ui); background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.45; padding-bottom:96px;}
  .mono{font-family:var(--mono)}

  /* Status bar */
  header{position:sticky; top:0; z-index:20; background:var(--navy);
    color:#fff; padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
    box-shadow:0 2px 10px rgba(7,26,90,.25)}
  .hrow{display:flex; align-items:center; gap:10px}
  .logo{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--mint),var(--gold));
    display:grid;place-items:center;font-weight:800;color:var(--navy);flex:0 0 auto}
  .htitle{font-size:14px;font-weight:700;letter-spacing:.2px}
  .hsub{font-size:11px;color:var(--mint);font-family:var(--mono)}
  .conn{margin-left:auto;display:flex;align-items:center;gap:8px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--synced)}
  .dot.off{background:var(--offline)}
  .pill{font-size:11px;font-family:var(--mono);padding:4px 9px;border-radius:999px;
    background:rgba(255,255,255,.12);white-space:nowrap}
  .queue{background:var(--pending);color:#20170a;font-weight:700}

  main{max-width:680px;margin:0 auto;padding:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:12px}
  h2.sec{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);
    margin:0 0 10px;font-weight:800}
  @media (prefers-color-scheme: dark){h2.sec{color:var(--gold)}}
  label.fld{display:block;font-size:12px;color:var(--muted);margin:0 0 4px;font-weight:600}
  input[type=text],input[type=date]{width:100%;font-size:16px;font-family:var(--mono);
    padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);
    color:var(--ink)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr;gap:10px}

  /* Accordion sections */
  .acc{border:1px solid var(--line);border-radius:14px;background:var(--card);margin-bottom:10px;overflow:hidden}
  .acc>summary{list-style:none;cursor:pointer;padding:14px;display:flex;align-items:center;gap:10px}
  .acc>summary::-webkit-details-marker{display:none}
  .snum{font-family:var(--mono);font-size:12px;color:#fff;background:var(--blue);
    width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:0 0 auto;font-weight:700}
  .stitle{font-size:14px;font-weight:700;flex:1}
  .sprog{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
  .chev{transition:transform .2s;color:var(--muted)}
  .acc[open] .chev{transform:rotate(90deg)}
  .items{padding:0 12px 6px}
  .item{border-top:1px solid var(--line);padding:11px 2px;display:flex;gap:10px;align-items:flex-start}
  .idesc{flex:1;font-size:13.5px}
  .marks{display:flex;gap:6px;flex:0 0 auto}
  .chip{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.05em;
    border:1px solid var(--line);background:var(--chip);color:var(--muted);
    padding:7px 9px;border-radius:9px;cursor:pointer;min-width:46px;text-align:center;user-select:none}
  .chip.on{background:var(--synced);border-color:var(--synced);color:#fff}

  /* Signature + stamp */
  .sigwrap{border:1px dashed var(--gold);border-radius:12px;background:var(--cream);position:relative}
  @media (prefers-color-scheme: dark){.sigwrap{background:#0c1424}}
  canvas#sig{width:100%;height:150px;display:block;touch-action:none;border-radius:12px}
  .sighint{position:absolute;inset:0;display:grid;place-items:center;color:var(--muted);
    font-size:13px;pointer-events:none}
  .stamp{margin-top:10px}
  .stampbtn{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;
    padding:10px 14px;border:1px solid var(--line);border-radius:10px;background:var(--chip);
    color:var(--ink);cursor:pointer}
  #stampPrev{max-height:90px;border-radius:8px;margin-top:8px;display:none;border:1px solid var(--line)}
  .link{background:none;border:none;color:var(--gold-deep);font-weight:600;font-size:12px;cursor:pointer;padding:0}
  @media (prefers-color-scheme: dark){.link{color:var(--gold)}}

  /* Submit bar */
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--card);
    border-top:1px solid var(--line);padding:12px 14px calc(env(safe-area-inset-bottom) + 12px);
    display:flex;gap:10px;max-width:680px;margin:0 auto}
  .btn{flex:1;font-size:15px;font-weight:700;border:none;border-radius:12px;padding:14px;cursor:pointer}
  .btn.primary{background:var(--navy);color:#fff}
  .btn.ghost{flex:0 0 auto;background:var(--chip);color:var(--ink);border:1px solid var(--line)}

  /* Outbox */
  .tabs{display:flex;gap:8px;margin-bottom:12px}
  .tab{flex:1;text-align:center;font-size:13px;font-weight:700;padding:10px;border-radius:10px;
    background:var(--chip);color:var(--muted);cursor:pointer;border:1px solid var(--line)}
  .tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .rec{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:var(--card)}
  .rec .top{display:flex;align-items:center;gap:8px}
  .reg{font-family:var(--mono);font-weight:700;font-size:14px}
  .status{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:700;
    padding:4px 9px;border-radius:999px}
  .s-pending{background:rgba(201,135,58,.15);color:var(--pending)}
  .s-synced{background:rgba(46,139,111,.15);color:var(--synced)}
  .meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:26px 10px}
  .banner{font-size:12px;background:rgba(201,168,76,.14);border:1px solid var(--gold);
    color:var(--gold-deep);border-radius:10px;padding:9px 12px;margin-bottom:12px;font-weight:600}
  @media (prefers-color-scheme: dark){.banner{color:var(--gold)}}
  .togglerow{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-top:8px}
  .switch{width:40px;height:22px;border-radius:999px;background:var(--line);position:relative;cursor:pointer;flex:0 0 auto}
  .switch.on{background:var(--offline)}
  .knob{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:.15s}
  .switch.on .knob{left:20px}
  .foot{text-align:center;font-size:10.5px;color:var(--muted);font-family:var(--mono);padding:6px 0 4px}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="logo">F</div>
    <div>
      <div class="htitle">GIV Pre-flight Inspection</div>
      <div class="hsub">Flybird · Gulfstream GIV</div>
    </div>
    <div class="conn">
      <span id="qpill" class="pill queue" style="display:none">0 queued</span>
      <span class="pill"><span id="dot" class="dot"></span> <span id="connlbl">Online</span></span>
    </div>
  </div>
</header>

<main>
  <div class="tabs">
    <div id="tabForm" class="tab active">New inspection</div>
    <div id="tabOut" class="tab">Outbox <span id="tabcount"></span></div>
  </div>

  <!-- FORM VIEW -->
  <section id="viewForm">
    <div class="card">
      <h2 class="sec">Aircraft & Flight</h2>
      <div class="grid2">
        <div><label class="fld">Aircraft Registration</label><input id="reg" type="text" placeholder="5N-XXX" autocomplete="off"></div>
        <div><label class="fld">TSN / CSN</label><input id="tsn" type="text" placeholder="hrs / cycles" autocomplete="off"></div>
      </div>
      <div style="margin-top:10px"><label class="fld">Date</label><input id="date" type="date"></div>
    </div>

    <div id="sections"></div>

    <div class="card">
      <h2 class="sec">Sign-off</h2>
      <label class="fld">Engineer's Name</label>
      <input id="eng" type="text" placeholder="Full name" autocomplete="off" style="margin-bottom:12px">
      <label class="fld">Signature</label>
      <div class="sigwrap">
        <canvas id="sig"></canvas>
        <div id="sighint" class="sighint">Sign here</div>
      </div>
      <button class="link" id="clearSig" style="margin-top:6px">Clear signature</button>

      <div class="stamp">
        <label class="fld" style="margin-top:8px">Stamp (photo)</label>
        <label class="stampbtn" for="stampInput">📷 Capture / upload stamp</label>
        <input id="stampInput" type="file" accept="image/*" capture="environment" style="display:none">
        <img id="stampPrev" alt="stamp preview">
      </div>

      <div class="togglerow">
        <div id="offSwitch" class="switch"><div class="knob"></div></div>
        <span>Simulate no connectivity (demo the offline flow)</span>
      </div>
    </div>
  </section>

  <!-- OUTBOX VIEW -->
  <section id="viewOut" style="display:none">
    <div id="storeBanner" class="banner"></div>
    <div id="reclist"></div>
  </section>

  <div class="foot" id="modeFoot"></div>
</main>

<div class="bar" id="formBar">
  <button class="btn ghost" id="resetBtn">Reset</button>
  <button class="btn primary" id="submitBtn">Save & submit</button>
</div>
<div class="bar" id="outBar" style="display:none">
  <button class="btn primary" id="syncBtn">Sync now</button>
</div>

<script>
/* ============================================================
   CONFIG — the only two lines you change to go to production
   ============================================================ */
const DEMO_MODE = true;          // true = simulate sending (for the preview/prototype)
                                 // false = actually POST to the backend below
const BACKEND_URL = "/api/submit"; // your Vercel function once deployed
/* ============================================================ */

/* ---- The checklist, taken verbatim from the Flybird GIV form ---- */
const CHECKLIST = [
 ["Documentation & Certification (NCAR Compliance)",[
   "Aircraft Technical Log (ATL) – onboard and updated.",
   "Review of previous defect entries – rectified or deferred per MEL/CDL.",
   "Aircraft documents folder – checked and confirmed updated with all required documents.",
   "Certificate of Airworthiness (C of A) and ARC validity confirmed.",
   "Flight Manual, MEL, QRH, checklists – present and accessible.",
   "Mandatory equipment (ELT, CVR, FDR, etc.) – operable.",
   "Debrief incoming crew for reported discrepancies (postflight).",
   "Brief outgoing crew on aircraft status and deferred items (Preflight)."]],
 ["Technical Additions (Gulfstream GIV Manuals)",[
   "APU oil level checked per GIV AMM 49-00-00.",
   "APU run log and general area – soot, leaks, panel integrity.",
   "Avionics cooling fan operation verified (GIV MM 31-50-00).",
   "Cargo bay smoke detector and fire suppression system (if installed).",
   "FOD inspection of ramp around aircraft – completed.",
   "Tool and rag control accounted for."]],
 ["Nose Section",[
   "Pitot static tubes – Condition and obstruction.",
   "Windshield and windows – Condition & security.",
   "Nose gear components – Security and integrity.",
   "Tires pressure and condition.",
   "Radome – Check radar switch & security."]],
 ["Fuselage",[
   "Outflow and dump valves – Visual check.",
   "Oxygen system – Pressure and vent status.",
   "Access doors/panels – Left and right secured.",
   "Antennas and AOA probes – Condition.",
   "General area – Cleanliness and signs of leaks."]],
 ["Wings",[
   "Flaps and rollers – Check for damage.",
   "Fuel caps and vent covers – Secure and clear.",
   "Static discharge wicks – Present and secure.",
   "Wing leading edges and winglets – Condition and security.",
   "Check for fuel leaks on upper and lower surfaces."]],
 ["Engine and Pylon",[
   "Intake/exhaust covers – Removed; check for FOD.",
   "Engine oil levels and quantity added.",
   "Engines/accessories – Security and leaks.",
   "Cowling latches and doors – Secure.",
   "Thrust reversers – Normal position."]],
 ["Main Wheel Wells",[
   "Main tire pressures and condition.",
   "Oleo strut height and cleanliness.",
   "Brakes – Damage, leaks and condition.",
   "Fuel lines and pump connectors – Condition and leaks.",
   "Utility lights, pump connectors – Operational status."]],
 ["Cockpit & Avionics",[
   "Circuit breakers – Depressed.",
   "Flight documentation – Present and updated.",
   "Flight & engine controls – Direction & travel.",
   "Safety systems – Warning lights, fire detectors, etc.",
   "Cockpit and equipment – Secured and clean."]],
 ["Entrance & Cabin",[
   "Circuit breakers and electronic rack – Checked.",
   "Emergency exits, lights, and smoke evacuation knob.",
   "Cabin configuration and ballast – Secure.",
   "Cabin area and baggage door – Clean and secured."]],
 ["Final (Just Prior to Departure)",[
   "Safety pins (gear and door valves) – Removed.",
   "Nose strut scissor pin – Installed.",
   "Weight-on-wheel switches – Clear.",
   "All service items completed and signed off.",
   "Pre-dispatch inspection logbook entries recorded."]]
];

/* ---------------- Durable storage (IndexedDB + fallback) ---------------- */
const Store = (() => {
  let db=null, mem=[], usingIDB=false;
  function open(){
    return new Promise(res=>{
      try{
        const r=indexedDB.open("flybird-preflight",1);
        r.onupgradeneeded=e=>e.target.result.createObjectStore("subs",{keyPath:"id"});
        r.onsuccess=e=>{db=e.target.result;usingIDB=true;res(true);};
        r.onerror=()=>res(false);
      }catch(e){res(false);}
    });
  }
  async function save(rec){
    if(usingIDB){return new Promise((ok,no)=>{const tx=db.transaction("subs","readwrite");
      tx.objectStore("subs").put(rec);tx.oncomplete=()=>ok();tx.onerror=()=>no();});}
    const i=mem.findIndex(x=>x.id===rec.id); i>=0?mem[i]=rec:mem.push(rec);
  }
  async function all(){
    if(usingIDB){return new Promise(ok=>{const out=[];const tx=db.transaction("subs","readonly");
      const c=tx.objectStore("subs").openCursor();
      c.onsuccess=e=>{const cur=e.target.result;if(cur){out.push(cur.value);cur.continue();}else ok(out);};});}
    return [...mem];
  }
  return {init:async()=>{await open();return usingIDB;}, save, all, get persistent(){return usingIDB;}};
})();

/* ---------------- App state ---------------- */
const marks = {};   // key `${s}-${i}-eng|tech` -> bool
let stampData = null;
let forceOffline = false;

const $=s=>document.querySelector(s);
function uuid(){return (crypto.randomUUID&&crypto.randomUUID())||("id-"+Date.now()+"-"+Math.random().toString(16).slice(2));}
function online(){return navigator.onLine && !forceOffline;}

/* ---------------- Render checklist ---------------- */
function renderSections(){
  const wrap=$("#sections"); wrap.innerHTML="";
  CHECKLIST.forEach((sec,si)=>{
    const d=document.createElement("details"); d.className="acc"; if(si===0)d.open=true;
    d.innerHTML=`<summary>
        <span class="snum">${si+1}</span>
        <span class="stitle">${sec[0]}</span>
        <span class="sprog" id="prog-${si}">0/${sec[1].length}</span>
        <span class="chev">▶</span>
      </summary><div class="items" id="items-${si}"></div>`;
    wrap.appendChild(d);
    const box=d.querySelector(`#items-${si}`);
    sec[1].forEach((desc,ii)=>{
      const row=document.createElement("div"); row.className="item";
      row.innerHTML=`<div class="idesc">${desc}</div>
        <div class="marks">
          <div class="chip" data-k="${si}-${ii}-eng">ENG</div>
          <div class="chip" data-k="${si}-${ii}-tech">TECH</div>
        </div>`;
      box.appendChild(row);
    });
  });
  wrap.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
    const k=c.dataset.k; marks[k]=!marks[k]; c.classList.toggle("on",marks[k]);
    updateProgress();
  }));
}
function updateProgress(){
  CHECKLIST.forEach((sec,si)=>{
    let n=0; sec[1].forEach((_,ii)=>{ if(marks[`${si}-${ii}-eng`]||marks[`${si}-${ii}-tech`]) n++; });
    const el=$("#prog-"+si); if(el) el.textContent=`${n}/${sec[1].length}`;
  });
}

/* ---------------- Signature pad ---------------- */
let sigCtx, drawing=false, signed=false;
function initSig(){
  const c=$("#sig"); const r=c.getBoundingClientRect();
  c.width=r.width*devicePixelRatio; c.height=150*devicePixelRatio;
  sigCtx=c.getContext("2d"); sigCtx.scale(devicePixelRatio,devicePixelRatio);
  sigCtx.lineWidth=2.2; sigCtx.lineCap="round"; sigCtx.strokeStyle="#0d1526";
  const pos=e=>{const b=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return[t.clientX-b.left,t.clientY-b.top];};
  const start=e=>{drawing=true;signed=true;$("#sighint").style.display="none";const[x,y]=pos(e);sigCtx.beginPath();sigCtx.moveTo(x,y);e.preventDefault();};
  const move=e=>{if(!drawing)return;const[x,y]=pos(e);sigCtx.lineTo(x,y);sigCtx.stroke();e.preventDefault();};
  const end=()=>drawing=false;
  c.addEventListener("pointerdown",start); c.addEventListener("pointermove",move);
  window.addEventListener("pointerup",end);
}
$("#clearSig").addEventListener("click",()=>{
  const c=$("#sig"); sigCtx.clearRect(0,0,c.width,c.height); signed=false; $("#sighint").style.display="grid";
});

/* ---------------- Stamp capture ---------------- */
$("#stampInput").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{stampData=rd.result; const p=$("#stampPrev"); p.src=stampData; p.style.display="block";};
  rd.readAsDataURL(f);
});

/* ---------------- Connectivity UI ---------------- */
function refreshConn(){
  const on=online();
  $("#dot").className="dot"+(on?"":" off");
  $("#connlbl").textContent=on?"Online":"Offline";
}
$("#offSwitch").addEventListener("click",()=>{
  forceOffline=!forceOffline; $("#offSwitch").classList.toggle("on",forceOffline);
  refreshConn(); if(online()) attemptSync();
});
window.addEventListener("online",()=>{refreshConn();attemptSync();});
window.addEventListener("offline",refreshConn);

/* ---------------- Submit ---------------- */
$("#submitBtn").addEventListener("click",async()=>{
  const reg=$("#reg").value.trim(), eng=$("#eng").value.trim();
  if(!reg||!eng){alert("Aircraft Registration and Engineer's Name are required.");return;}
  const items=[];
  CHECKLIST.forEach((sec,si)=>sec[1].forEach((desc,ii)=>items.push({
    section:sec[0], item:desc,
    eng:!!marks[`${si}-${ii}-eng`], tech:!!marks[`${si}-${ii}-tech`]
  })));
  const rec={
    id:uuid(), status:"pending", createdAt:new Date().toISOString(),
    registration:reg, tsn:$("#tsn").value.trim(), date:$("#date").value,
    engineer:eng,
    signature:signed?$("#sig").toDataURL("image/png"):null,
    stamp:stampData, items
  };
  await Store.save(rec);
  await refreshOutbox();
  resetForm();
  goTo("out");
  attemptSync();
});

/* ---------------- Sync engine (store-and-forward) ---------------- */
let syncing=false;
async function attemptSync(){
  if(syncing) return; syncing=true;
  try{
    const recs=(await Store.all()).filter(r=>r.status==="pending");
    if(online()){
      for(const r of recs){
        let ok=false;
        if(DEMO_MODE){ await new Promise(res=>setTimeout(res,700)); ok=true; }
        else{
          try{
            const resp=await fetch(BACKEND_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(r)});
            ok=resp.ok;
          }catch(e){ ok=false; }
        }
        if(ok){ r.status="synced"; r.syncedAt=new Date().toISOString(); await Store.save(r); await refreshOutbox(); }
      }
    }
  } finally { syncing=false; updateBadges(); }
}
$("#syncBtn").addEventListener("click",attemptSync);

/* ---------------- Outbox rendering ---------------- */
async function refreshOutbox(){
  const recs=(await Store.all()).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  const list=$("#reclist");
  if(!recs.length){ list.innerHTML=`<div class="empty">No inspections saved yet.<br>Completed forms are stored on this device and appear here.</div>`; }
  else{
    list.innerHTML=recs.map(r=>{
      const checked=r.items.filter(i=>i.eng||i.tech).length;
      const sc=r.status==="synced"?"s-synced":"s-pending";
      const lbl=r.status==="synced"?"Synced ✓":"Pending ↑";
      return `<div class="rec"><div class="top">
        <span class="reg">${r.registration||"—"}</span>
        <span class="status ${sc}">${lbl}</span></div>
        <div class="meta">${r.date||"no date"} · ${r.engineer||"—"} · ${checked}/${r.items.length} items · ${r.signature?"signed":"unsigned"} · ${r.stamp?"stamp":"no stamp"}</div>
        <div class="meta">ID ${r.id.slice(0,13)}… · saved ${new Date(r.createdAt).toLocaleString()}</div>
      </div>`;
    }).join("");
  }
  updateBadges();
}
async function updateBadges(){
  const recs=await Store.all();
  const pend=recs.filter(r=>r.status==="pending").length;
  $("#tabcount").textContent=recs.length?`(${recs.length})`:"";
  const q=$("#qpill");
  if(pend>0){ q.style.display="inline-block"; q.textContent=`${pend} queued`; }
  else q.style.display="none";
}

/* ---------------- View switching ---------------- */
function goTo(v){
  const isForm=v==="form";
  $("#viewForm").style.display=isForm?"block":"none";
  $("#viewOut").style.display=isForm?"none":"block";
  $("#formBar").style.display=isForm?"flex":"none";
  $("#outBar").style.display=isForm?"none":"flex";
  $("#tabForm").classList.toggle("active",isForm);
  $("#tabOut").classList.toggle("active",!isForm);
  if(!isForm) refreshOutbox();
}
$("#tabForm").addEventListener("click",()=>goTo("form"));
$("#tabOut").addEventListener("click",()=>goTo("out"));

/* ---------------- Reset ---------------- */
function resetForm(){
  ["reg","tsn","eng"].forEach(id=>$("#"+id).value="");
  $("#date").valueAsDate=new Date();
  Object.keys(marks).forEach(k=>delete marks[k]);
  document.querySelectorAll(".chip.on").forEach(c=>c.classList.remove("on"));
  updateProgress();
  $("#clearSig").click(); stampData=null;
  const p=$("#stampPrev"); p.style.display="none"; p.src="";
}
$("#resetBtn").addEventListener("click",()=>{ if(confirm("Clear this form?")) resetForm(); });

/* ---------------- Boot ---------------- */
(async function(){
  await Store.init();
  $("#storeBanner").textContent = Store.persistent
    ? "Storage: on-device database — submissions survive if you close the app or lose power."
    : "Storage: in-memory (preview mode) — deploy to a real URL for permanent on-device storage.";
  $("#modeFoot").textContent = (DEMO_MODE?"DEMO MODE · sends are simulated":"LIVE · posts to "+BACKEND_URL)
     + " · storage: " + (Store.persistent?"IndexedDB":"memory");
  renderSections();
  initSig();
  $("#date").valueAsDate=new Date();
  refreshConn();
  await refreshOutbox();
  if(online()) attemptSync();
  if("serviceWorker" in navigator){ try{ navigator.serviceWorker.register("sw.js"); }catch(e){} }
})();
</script>
</body>
</html>
